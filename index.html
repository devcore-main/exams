<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Security Exam</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="startScreen" class="start-screen">
  <h1>Cyber Security Exam</h1>
  <input id="studentName" placeholder="Enter your name">
  <button onclick="startExam()">Start Exam</button>
</div>

<!-- Sidebar overlay backdrop -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="layout" id="exam" style="display:none">

  <!-- Hamburger Drawer -->
  <div class="sidebar-drawer" id="sidebarDrawer">
    <div class="sidebar-header">
      <span>Questions</span>
      <button class="close-btn" onclick="closeSidebar()">✕</button>
    </div>
    <div class="sidebar" id="sidebar"></div>
  </div>

  <div class="exam-container">

    <div class="top-bar">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="hamburger-btn" onclick="openSidebar()">☰</button>
        <div id="student"></div>
      </div>
      <div id="timer"></div>
    </div>

    <div id="progress"></div>
    <h2 id="question"></h2>
    <div id="choices"></div>

    <p id="error" class="error">
      Please select an answer first
    </p>

    <div class="buttons">
      <button onclick="prevQuestion()">Previous</button>
      <button onclick="nextQuestion()">Next</button>
    </div>

  </div>

</div>

<script src="question.js"></script>
<script src="script.js"></script>

</body>
</html>
